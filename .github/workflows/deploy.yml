name: CI/CD Pipeline para Guías API

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construir y subir imagen
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Cambia "tu_usuario_docker" por tu usuario real de Docker Hub
        tags: Vyridids/guias-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Conectarse por SSH y actualizar Contenedor en AWS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_EC2_HOST }}
        username: ${{ secrets.AWS_EC2_USER }}
        key: ${{ secrets.AWS_EC2_KEY }}
        script: |
          if ! command -v docker &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y docker.io
          fi
          
          sudo docker pull Vyridids/guias-api:latest
          
          sudo docker stop contenedor-guias || true
          sudo docker rm contenedor-guias || true
          
          sudo docker run -d -p 8080:8080 --name contenedor-guias -v /mnt/efs/fs1:/app/temporal_efs Vyridids/guias-api:latest